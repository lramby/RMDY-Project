<div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="taskModalTitle">Task</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="taskEditForm">
          <input type="hidden" id="task-row-index">
          <input type="hidden" id="task-unique-id">
          <div class="mb-3">
            <label class="form-label small fw-bold">Task Type</label>
            <select id="edit-task-type" class="form-select">
              <option value="">Loading tasks...</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Value</label>
            <input type="number" id="edit-task-value" class="form-control" step="0.01">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Assign to Room</label>
            <select id="edit-task-room" class="form-select">
              <option value="">Loading rooms...</option>
            </select>
          </div>
					<div class="mb-3">
            <label class="form-label fw-bold small">Price</label>
            <input type="number" id="edit-task-price" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Cost</label>
            <input type="number" id="edit-task-cost" class="form-control">
          </div>
					
					<div class="mb-3">
            <label class="form-label fw-bold small">Note</label>
            <textarea type="text" id="edit-task-note" class="form-control"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="taskSaveBtn" onclick="submitTaskEdit()">Save Task</button>
      </div>
    </div>
  </div>
</div>
