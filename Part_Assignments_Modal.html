<div class="modal fade" id="assignmentModal" tabindex="-1" aria-labelledby="asgnModalTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="asgnModalTitle">Add Team Member</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="asgn-form">
          <input type="hidden" id="asgn-sheet-row">

          <div class="row g-3">
            <div class="col-12">
              <label for="asgn-role" class="form-label small fw-bold">Role</label>
              <select id="asgn-role" class="form-select" required>
                <option value="">Loading Roles...</option>
              </select>
            </div>

            <div class="col-md-5">
              <label for="asgn-first" class="form-label small fw-bold">First Name</label>
              <input type="text" id="asgn-first" class="form-control" placeholder="John" required>
            </div>
            <div class="col-md-2">
              <label for="asgn-middle" class="form-label small fw-bold">Middle Name</label>
              <input type="text" id="asgn-middle" class="form-control">
            </div>
            <div class="col-md-5">
              <label for="asgn-last" class="form-label small fw-bold">Last Name</label>
              <input type="text" id="asgn-last" class="form-control" placeholder="Doe" required>
            </div>

            <div class="col-md-6">
              <label for="asgn-email" class="form-label small fw-bold">Email</label>
              <input type="email" id="asgn-email" class="form-control" placeholder="john@example.com">
            </div>
            <div class="col-md-6">
              <label for="asgn-phone" class="form-label small fw-bold">Phone</label>
              <input type="tel" id="asgn-phone" class="form-control" placeholder="555-0123">
            </div>

            <div class="col-12">
              <label for="asgn-company" class="form-label small fw-bold">Company</label>
              <select id="asgn-company" class="form-select" required>
                <option value="">Loading Companies...</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer bg-light">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="asgnSaveBtn" class="btn btn-primary" onclick="processSaveAssignment()">Save Assignment</button>
      </div>
    </div>
  </div>
</div>
