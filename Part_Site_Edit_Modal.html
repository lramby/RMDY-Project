<div class="modal fade" id="siteEditModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5 class="modal-title">Edit Site Information</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="siteEditForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Construction Type</label>
              <select id="edit-construction-type" class="form-select"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Approx. Sq Ft</label>
              <select id="edit-area" class="form-select"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Year Built</label>
              <input type="number" id="edit-year-built" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Occupancy</label>
              <select id="edit-occupancy_type" class="form-select"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Usage Type</label>
              <select id="edit-usage-type" class="form-select"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Residence Type</label>
              <select id="edit-property-type" class="form-select"></select>
            </div>
            <div class="col-md-12">
              <label class="form-label small fw-bold">Basement Selection</label>
              <select id="edit-basement-type" class="form-select"></select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="siteSaveBtn" onclick="submitSiteEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>
