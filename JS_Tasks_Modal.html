<script>

  function openTaskModal(index = null) {
    loadDropdownCache(() => {
        const form = document.getElementById('taskEditForm');
        if (form) form.reset();
        
        populateSelect('edit-task-type', 'Tasks');

        if (index !== null) {
            const task = currentTasks[index];
            document.getElementById('taskModalTitle').innerText = "Edit Task";
            document.getElementById('task-row-index').value = task.sheetRow;
            document.getElementById('task-unique-id').value = task.taskId || "";
            
            document.getElementById('edit-task-type').value = task.taskName;
            document.getElementById('edit-task-value').value = task.value;
            document.getElementById('edit-task-price').value = task.price.replace(/[^0-9.-]+/g,"");
            document.getElementById('edit-task-cost').value = task.cost.replace(/[^0-9.-]+/g,"");
            document.getElementById('edit-task-note').value = (task.note === "-" || !task.note) ? "" : task.note;
            
            loadRoomDropdown(task.roomId);
        } else {
            document.getElementById('taskModalTitle').innerText = "Add New Task";
            document.getElementById('task-row-index').value = ""; 

            // --- GENERATE TASK ID JUST LIKE ROOMS ---
            const newTaskId = 'T-' + Date.now() + Math.floor(Math.random() * 1000);
            document.getElementById('task-unique-id').value = newTaskId;
            // ----------------------------------------

            document.getElementById('edit-task-value').value = 1;
            loadRoomDropdown(""); 
        }

        const modalElt = document.getElementById('taskModal');
        bootstrap.Modal.getOrCreateInstance(modalElt).show();
    });
}


  function submitTaskEdit() {
    const btn = document.getElementById('taskSaveBtn');
    
    // 1. Get the Room Select element
    const roomSelect = document.getElementById('edit-task-room');
    
    // 2. Get the text of the currently selected option
    // If nothing is selected or it's the default, we use an empty string
    const selectedRoomName = roomSelect.selectedIndex >= 0 ? 
                             roomSelect.options[roomSelect.selectedIndex].text : "";

    const taskObj = {
        sheetRow: document.getElementById('task-row-index').value,
        taskId: document.getElementById('task-unique-id').value,
        roomId: roomSelect.value, // This is the ID
        roomName: selectedRoomName, // <--- Added this to capture the display name
        taskName: document.getElementById('edit-task-type').value,
        value: document.getElementById('edit-task-value').value,
        unit: "", 
        price: document.getElementById('edit-task-price').value,
        cost: document.getElementById('edit-task-cost').value,
        note: document.getElementById('edit-task-note').value
    };

    if (!taskObj.taskName) {
        alert("Please select a task type.");
        return;
    }

    btn.disabled = true;
    google.script.run
        .withSuccessHandler(function(updatedTasks) {
            const modalElt = document.getElementById('taskModal');
            bootstrap.Modal.getInstance(modalElt).hide();
            btn.disabled = false;
            showTasks(updatedTasks);
        })
        .saveTask(taskObj);
	}

  function handleDeleteTask(row) {
    if (confirm("Permanently delete this task?")) {
      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success === false) {
            alert("⚠️ " + response.error);
            return;
          }
          google.script.run.withSuccessHandler(showTasks).getTasksData();
        })
        .deleteTask(row);
    }
  }

  function loadRoomDropdown(selectedRoomId = "") {
    const select = document.getElementById('edit-task-room');
    if (!select) return;
    google.script.run.withSuccessHandler((options) => {
      select.innerHTML = '<option value="">-- No Room Assigned --</option>';
      options.forEach(opt => {
        const el = document.createElement('option');
        el.value = opt.id;
        el.textContent = opt.display;
        if (opt.id === selectedRoomId) el.selected = true;
        select.appendChild(el);
      });
    }).getRoomOptionsForTask();
  }
  
</script>
