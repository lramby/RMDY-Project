<script>
  // We keep currentTasks as the local 'source of truth' for the table
  let currentTasks = [];

  /** 1. Render Table */
  function showTasks(tasks) {
    const loader = document.getElementById('tasks-loader'),
          content = document.getElementById('tasks-content'),
          noSel = document.getElementById('tasks-no-selection'),
          tbody = document.getElementById('tasks-table-body');
          
    if (loader) loader.style.display = 'none';
    
    if (tasks === null) {
      if (noSel) noSel.style.display = 'block';
      if (content) content.style.display = 'none';
      return;
    }

    if (noSel) noSel.style.display = 'none';
    if (content) content.style.display = 'block';


    currentTasks = tasks || [];
    if (!tbody) return;
    tbody.innerHTML = '';

    if (currentTasks.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">No tasks found.</td></tr>`;
      return;
    }

    currentTasks.forEach((task, index) => {
      tbody.insertAdjacentHTML('beforeend', `
				<tr class="align-middle">
          <td class="p-0"> 
            <div class="d-flex align-items-center w-100 p-3">
              <div class="flex-grow-1">
                <div class="row g-3">
                  
                  <div class="col-12 col-md-6">
                    <div class="fw-bold text-primary">${task.taskName}</div>
										<div class="">Room: <strong>${task.roomName}</strong></div>
                    <div class="small text-muted text-wrap">Note: ${task.note || '---'}</div>
                  </div>

                  <div class="col-12 col-md-6 border-start border-md-start">
                    <div class="">Qty: <span class="fw-bold">${task.value} ${task.unit}</span></div>
                    <div class="">Price: <span class="fw-bold">${task.price}</span> 
                      <span class="text-muted" style="font-size: 0.75rem;">(Sub: ${task.priceSubTotal})</span>
                    </div>
                    <div class="">Cost: <span class="fw-bold">${task.cost}</span>
                      <span class="text-muted" style="font-size: 0.75rem;">(Sub: ${task.costSubTotal})</span>
                    </div>
                  </div>

                </div>
              </div>

              <div class="ms-3 d-flex flex-column gap-2">
                <button class="btn btn-sm btn-outline-primary" onclick="window.openTaskModal(${index})">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="handleDeleteTask(${task.sheetRow})">
                  <i class="bi bi-trash"></i>
                </button>
              </div>

            </div>
          </td>
        </tr>
				`);
    });
  }
</script>
