<script>
  // We keep currentTasks as the local 'source of truth' for the table
  let currentTasks = [];

  /** 1. Render Table */
  function showTasks(tasks) {
    const loader = document.getElementById('tasks-loader'),
          content = document.getElementById('tasks-content'),
          noSel = document.getElementById('tasks-no-selection'),
          tbody = document.getElementById('tasks-table-body');
          
    if (loader) loader.style.display = 'none';
    
    if (tasks === null) {
      if (noSel) noSel.style.display = 'block';
      if (content) content.style.display = 'none';
      return;
    }

    if (noSel) noSel.style.display = 'none';
    if (content) content.style.display = 'block';


    currentTasks = tasks || [];
    if (!tbody) return;
    tbody.innerHTML = '';

    if (currentTasks.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">No tasks found.</td></tr>`;
      return;
    }

    currentTasks.forEach((task, index) => {
      tbody.insertAdjacentHTML('beforeend', `
        <tr>
          <td>
            <table>
              <tr>
                <td class="fw-bold text-primary"><strong>${task.taskName}</strong></td>
              </tr>
              <tr>
                <td>Room: <span class="fw-semibold">${task.roomName || 'Unassigned'}</strong></td>
              </tr>
              <tr>
                <td>Value: <span class="fw-semibold">${task.value} ${task.unit || 'Unassigned'}</strong></td>
              </tr>
              <tr>
                <td>Price: <span class="fw-semibold">${task.price || 'Unassigned'} sub ${task.priceSubTotal || 'Unassigned'}</strong></td>
              </tr>
              <tr>
                <td>Cost: <span class="fw-semibold">${task.cost || 'Unassigned'} sub ${task.costSubTotal || 'Unassigned'}</strong></td>
              </tr>
              <tr>
                <td>Note: <span class="fw-semibold">${task.note || 'Unassigned'}</strong></td>
              </tr>
            </table>
          </td>
          
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary me-1" onclick="window.openTaskModal(${index})">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" onclick="handleDeleteTask(${task.sheetRow})">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>`);
    });
  }
</script>
