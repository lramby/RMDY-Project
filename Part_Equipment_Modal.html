<div class="modal fade" id="equipmentModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="equipModalTitle">Equipment Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">

        <form id="equipmentForm">
          <input type="hidden" id="equip-sheet-row">

          <div class="mb-3">
            <label class="form-label fw-bold small">Equipment Name</label>
            <select id="equip-item-name" class="form-select">
              <option value="">Loading...</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Quantity</label>
            <input type="number" id="equip-qty" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Unit</label>
            <select id="equip-unit-select" class="form-select">
              <option value="">Loading units...</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Assign to Task</label>
            <select id="equip-task-select" class="form-select">
              <option value="">Loading tasks...</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">Price</label>
            <input type="number" id="equip-price" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Cost</label>
            <input type="number" id="equip-cost" class="form-control">
          </div>
					
					<div class="mb-3">
            <label class="form-label fw-bold small">Note</label>
            <textarea type="text" id="equip-note" class="form-control"></textarea>
          </div>

        </form>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="equipSaveBtn" class="btn btn-primary" onclick="processSaveEquipment()">Save</button>
      </div>
    </div>
  </div>
</div>
