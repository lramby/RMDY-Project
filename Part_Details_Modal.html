<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5 class="modal-title" id="editModalLabel">Edit Project Info</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="detailsEditForm">
          <div class="mb-3">
            <label class="form-label small fw-bold">Street Address</label>
            <input type="text" id="edit-address" class="form-control">
            <div class="invalid-feedback">Please input an address.</div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Address 2 (Apt/Suite)</label>
            <input type="text" id="edit-address2" class="form-control">
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label small fw-bold">City</label>
              <input type="text" id="edit-city" class="form-control">
              <div class="invalid-feedback">Please input a city.</div>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label small fw-bold">State</label>
              <select id="edit-state" class="form-select">
                <option value="" disabled selected>Loading...</option>
              </select>
              <div class="invalid-feedback">Please select a state.</div>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label small fw-bold">Zip</label>
              <input type="text" id="edit-zip" class="form-control">
            </div>
            <div class="invalid-feedback">Please input a zip.</div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Country</label>
            <select id="edit-country" class="form-select">
              <option value="" disabled selected>Loading...</option>
            </select>
            <div class="invalid-feedback">Please select a country.</div>
          </div>

          <hr class="my-4">

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label small fw-bold">First Name</label>
              <input type="text" id="edit-firstName" class="form-control">
              <div class="invalid-feedback">Please input the contact's first name.</div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label small fw-bold">Last Name</label>
              <input type="text" id="edit-lastName" class="form-control">
              <div class="invalid-feedback">Please input the contact's last name.</div>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Phone</label>
            <input type="tel" id="edit-phone" class="form-control">
            <div class="invalid-feedback">Please input the contact's phone number.</div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Email Address</label>
            <input type="email" id="edit-email" class="form-control">
            <div class="invalid-feedback">Please input the contact's email address.</div>
          </div>
        </form>
      </div>
      <div class="modal-footer bg-light">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary px-4" id="saveBtn" onclick="submitEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>
