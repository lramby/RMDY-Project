<div class="modal fade" id="manageEditModal" tabindex="-1" aria-labelledby="manageEditModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="manageEditModalLabel">Edit Project Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        
        <input type="hidden" id="edit-row-index">

        <div class="mb-3">
          <label for="edit-status" class="form-label">Status</label>
          <select id="edit-status" class="form-select">
            <option value="Active">Active</option>
            <option value="On Hold">On Hold</option>
            <option value="Closed">Closed</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="edit-policy" class="form-label">Policy Number</label>
          <input type="text" class="form-control" id="edit-policy">
        </div>

        <div class="mb-3">
          <label for="edit-claim" class="form-label">Claim Number</label>
          <input type="text" class="form-control" id="edit-claim">
        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitManageUpdate()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="newProjectModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create New Project</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        
        <form id="newProjectForm">
          
          <div class="mb-3">
            <label class="form-label">Client</label>
            <select class="form-select" id="new-client" name="client" required>
              </select>
          </div>

          <div class="mb-3">
						<label class="form-label">Project Type</label>
						<select class="form-select" id="new-type" name="type" required>
							<option value="">Loading types...</option>
						</select>
					</div>

          <div class="mb-3">
            <label class="form-label">Policy #</label>
            <input type="text" class="form-control" id="new-policy" name="policy">
          </div>

          <div class="mb-3">
            <label class="form-label">Claim #</label>
            <input type="text" class="form-control" id="new-claim" name="claim">
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="submitNewProject()">Create Project</button>
      </div>
    </div>
  </div>
</div>
