<div class="modal fade" id="editProjectModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5 class="modal-title">Edit Project Reference</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editProjectForm">
          <input type="hidden" id="edit-rowIndex">
          <div class="d-none mb-3">
            <label class="form-label small fw-bold">Claim #</label>
            <input type="text" id="edit-claim" class="form-control">
          </div>
          <div class="d-none mb-3">
            <label class="form-label small fw-bold">Policy #</label>
            <input type="text" id="edit-policy" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Status</label>
            <select id="edit-status" class="form-select">
              <option value="Active">Active</option>
              <option value="Pending">Pending</option>
              <option value="Closed">Closed</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="updateBtn" onclick="submitEditProject()">Update Project</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="newProjectModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5 class="modal-title">Create New Project</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="newProjectForm">
          <div class="mb-3">
            <label class="form-label small fw-bold">Client Name</label>
            <select id="new-client" class="form-select" required>
              <option value="">Loading clients...</option>
            </select>
          </div>
          <div class="row">
            <div class="col-6 mb-3"><label class="form-label small fw-bold">Claim #</label><input type="text" id="new-claim" class="form-control"></div>
            <div class="col-6 mb-3"><label class="form-label small fw-bold">Policy #</label><input type="text" id="new-policy" class="form-control"></div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Project Type</label>
            <select id="new-type" class="form-select" required>
              <option value="Water">Water</option>
              <option value="Fire">Fire</option>
              <option value="Fire">Wind</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="createBtn" onclick="submitNewProject()">Create Project</button>
      </div>
    </div>
  </div>
</div>
