<script>
    /**
     * Store tasks for the project-specific dropdown
     */
    let equipProjectTasks = [];

    /**
     * Triggered by the "Add Equipment" button
     */
    function openEquipmentModal() {
        loadDropdownCache(() => {
            // 1. Populate standard dropdowns
            populateSelect('equip-item-name', 'EquipmentType');
            populateSelect('equip-unit-select', 'EquipmentUnits');

            // 2. Fetch Tasks for dropdown
            google.script.run.withSuccessHandler(tasks => {
                equipProjectTasks = tasks || [];
                const select = document.getElementById('equip-task-select');
                if (select) {
                    select.innerHTML = '<option value="">Select Task...</option>' + 
                    equipProjectTasks.map(t => 
                        `<option value="${t.taskId}">${t.taskName} (${t.roomName})</option>`
                    ).join('');
                }

                // 3. Reset input fields
                const fields = ['equip-sheet-row', 'equip-qty', 'equip-unit-select', 'equip-price', 'equip-cost', 'equip-note'];
                fields.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = "";
                });

                // 4. Show Modal
                document.getElementById('equipModalTitle').innerText = "Add Equipment";
                const modalEl = document.getElementById('equipmentModal');
                bootstrap.Modal.getOrCreateInstance(modalEl).show();
            }).getTasksData();
        });
    }

    /**
     * Saves the data (Add or Update)
     */
    function processSaveEquipment() {
        const btn = document.getElementById('equipSaveBtn');
        const taskSelect = document.getElementById('equip-task-select');
        if (!taskSelect) return;

        const selectedTask = equipProjectTasks.find(t => String(t.taskId) === String(taskSelect.value));

        const equipObj = {
            sheetRow: document.getElementById('equip-sheet-row')?.value || "",
            item: document.getElementById('equip-item-name')?.value || "",
            value: document.getElementById('equip-qty')?.value || 0, 
            unit: document.getElementById('equip-unit-select')?.value || "",
            price: document.getElementById('equip-price')?.value || 0,
            cost: document.getElementById('equip-cost')?.value || 0,
            note: document.getElementById('equip-note')?.value || "",
            taskId: taskSelect.value,
            taskName: selectedTask ? selectedTask.taskName : "No Task Assigned",
            roomName: selectedTask ? selectedTask.roomName : "No Room Assigned",
            roomId: selectedTask ? selectedTask.roomId : ""
        };

        if (!equipObj.item || !equipObj.value || !equipObj.taskId) {
            alert("Please complete Item, Quantity, and Task.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';

        google.script.run
            .withSuccessHandler((newData) => {
                btn.disabled = false;
                btn.innerText = 'Save';
                if (typeof renderEquipment === 'function') renderEquipment(newData);
                bootstrap.Modal.getInstance(document.getElementById('equipmentModal')).hide();
            })
            .saveEquipmentData(equipObj);
    }

    /**
     * Sets up the modal for editing
     */
    function handleEditEquipment(row) {
        if (typeof currentEquipList === 'undefined') return;
        
        const equip = currentEquipList.find(m => m.sheetRow == row);
        if (!equip) return;

        loadDropdownCache(() => {
            populateSelect('equip-item-name', 'EquipmentType', equip.item);
            populateSelect('equip-unit-select', 'EquipmentUnits', equip.unit);

            google.script.run.withSuccessHandler(tasks => {
                equipProjectTasks = tasks || [];
                const select = document.getElementById('equip-task-select');
                if (select) {
                    select.innerHTML = equipProjectTasks.map(t => 
                        `<option value="${t.taskId}">${t.taskName} (${t.roomName})</option>`
                    ).join('');
                    select.value = equip.taskId;
                }
                
                document.getElementById('equip-sheet-row').value = equip.sheetRow;
                document.getElementById('equip-qty').value = equip.value;
                document.getElementById('equip-price').value = equip.price.replace(/[^0-9.-]+/g,"");
                document.getElementById('equip-cost').value = equip.cost.replace(/[^0-9.-]+/g,"");
                document.getElementById('equip-note').value = (equip.note === "-" || !equip.note) ? "" : equip.note;

                document.getElementById('equipModalTitle').innerText = "Edit Equipment";
                bootstrap.Modal.getOrCreateInstance(document.getElementById('equipmentModal')).show();
            }).getTasksData();
        });
    }

    /**
     * MISSING FUNCTION: handleDeleteEquipment
     * Logic for deleting a row
     */
    function handleDeleteEquipment(row) {
        if (confirm("Permanently delete this equipment item?")) {
            google.script.run
                .withSuccessHandler((newData) => {
                    if (typeof renderEquipment === 'function') renderEquipment(newData);
                })
                .deleteEquipment(row);
        }
    }
</script>
