<div class="modal fade" id="insuranceModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title" id="insModalTitle">Edit Insurance Details</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="insuranceEditForm">
          <input type="hidden" id="ins-sheet-row">
          <input type="hidden" id="ins-id-hidden">

          <div class="row g-4">
            
            <div class="col-md-7">
              <div class="p-3 border rounded bg-light h-100">
                <h5 class="text-muted small text-uppercase mb-3"><i class="bi bi-shield-check me-2"></i>Coverage Details</h5>
                
                <div class="row mb-3">
                  <div class="col-12 mb-2">
                    <label class="d-block text-secondary small fw-bold">Insurance Company</label>
                    <input type="text" id="ins-company" class="form-control">
                  </div>
                </div>

                <div class="row mb-3">
                  <div class="col-6">
                    <label class="d-block text-secondary small fw-bold">Loss Type</label>
                    <select id="ins-type" class="form-select">
                        <option value="Water">Water</option>
                        <option value="Fire">Fire</option>
                        <option value="Mold">Mold</option>
                        <option value="Storm">Storm</option>
                        <option value="Other">Other</option>
                    </select>
                  </div>
                  <div class="col-6">
                    <label class="d-block text-secondary small fw-bold">Claim #</label>
                    <input type="text" id="ins-claim" class="form-control text-primary fw-bold">
                  </div>
                </div>

                <div class="row mb-3">
                  <div class="col-12">
                    <label class="d-block text-secondary small fw-bold">Policy #</label>
                    <input type="text" id="ins-policy" class="form-control font-monospace">
                  </div>
                </div>

                <div class="mt-3 p-2 border-top">
                  <label class="d-block text-dark small fw-bold">Date of Loss (Insurance Sheet)</label>
                  <input type="date" id="ins-date" class="form-control fw-bold text-dark">
                </div>

                <div class="mt-2 p-2 border-start border-info bg-light">
                  <label class="d-block text-info small fw-bold">Reference Date (from Dates Table)</label>
                  <span id="display-date-loss-ref" class="text-muted small fs-6">N/A</span>
                </div>
              </div>
            </div>

            <div class="col-md-5">
              <div class="p-3 border rounded h-100">
                <h5 class="text-muted small text-uppercase mb-3"><i class="bi bi-person-circle me-2"></i>Insured Party</h5>
                <div class="mb-3">
                  <label class="d-block text-secondary small fw-bold">First Name</label>
                  <input type="text" id="ins-first-name" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="d-block text-secondary small fw-bold">Last Name</label>
                  <input type="text" id="ins-last-name" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="d-block text-secondary small fw-bold">Email Address</label>
                  <input type="email" id="ins-email" class="form-control">
                </div>
                
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer bg-light">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="insSaveBtn" onclick="processSaveInsurance()">
            <i class="bi bi-save me-1"></i> Save Insurance
        </button>
      </div>
    </div>
  </div>
</div>
