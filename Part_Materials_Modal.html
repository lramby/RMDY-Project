<div class="modal fade" id="materialModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="matModalTitle">Material Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="materialForm">
          <input type="hidden" id="mat-sheet-row">
          <div class="mb-3">
            <label class="form-label fw-bold small">Material Name</label>
            <select id="mat-item-name" class="form-select">
              <option value="">Loading...</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Quantity</label>
            <input type="number" id="mat-qty" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Assign to Task</label>
            <select id="mat-task-select" class="form-select">
              <option value="">Loading tasks...</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="matSaveBtn" class="btn btn-primary" onclick="processSaveMaterials()">Save</button>
      </div>
    </div>
  </div>
</div>
