<script>

  function loadAssignments() {
    const loader = document.getElementById('assign-loader');
    const content = document.getElementById('assign-content');
    
    if (loader) loader.style.display = 'block';
    if (content) content.style.display = 'none';

    // Talk to the server
    google.script.run
      .withSuccessHandler(renderAssignments)
      .withFailureHandler(function(err) {
         console.error("Frontend Error:", err);
         if (loader) loader.style.display = 'none';
         // Handle error UI here
      })
      .getAssignmentsDataForActivePid(); 
  }

  function renderAssignments(data) {
    const loader = document.getElementById('assign-loader');
    const content = document.getElementById('assign-content');
    const tbody = document.getElementById('assign-table-body');
    
    if (loader) loader.style.display = 'none';
    
    // If no data returned, handle it gracefully without crashing
    if (!data || data.length === 0) {
      if (content) content.style.display = 'block';
      if (tbody) tbody.innerHTML = `<tr><td class="text-center text-muted py-4">No team members assigned.</td></tr>`;
      return;
    }
    
    currentAssignments = data;

    if (content) {
      content.style.display = 'block';
      if (tbody) {
        tbody.innerHTML = ''; // Clear existing rows
        currentAssignments.forEach((a) => {
          tbody.insertAdjacentHTML('beforeend', `
            <tr>
              <td>
                <div class="fw-bold text-primary">${a.firstName} ${a.middleName || ''} ${a.lastName}</div>
                <div class="small"><strong>Role:</strong> ${a.roleName}</div>
                <div class="small"><strong>Company:</strong> ${a.companyCode}</div>
                <div class="small text-muted">${a.email} | ${a.phone}</div>
              </td>
              <td class="text-end align-middle">
                <button class="btn btn-sm btn-outline-primary me-1" onclick="handleEditAssignment(${a.rowIndex})">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="handleDeleteAssignment(${a.rowIndex})">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>`);
        });
      }
    }
  }
</script>
