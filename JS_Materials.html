<script>
  let currentMaterials = [];
  let currentProjectTasks = []; // GLOBAL: Essential for finding room details on save

  function initMaterials() {
    loadMaterials();
  }

  function loadMaterials() {
    const loader = document.getElementById('materials-loader');
    const content = document.getElementById('materials-content');
    
    if (loader) loader.style.display = 'block';
    if (content) content.style.display = 'none';
    
    google.script.run
      .withSuccessHandler(renderMaterials)
      .withFailureHandler(err => {
        console.error("Server Error:", err);
        if (loader) {
          loader.innerHTML = `<div class="alert alert-danger mx-3"><strong>Server Error:</strong> ${err.message}</div>`;
        }
      })
      .getMaterialsData();
  } 

  function renderMaterials(data) {
    const loader = document.getElementById('materials-loader');
    const content = document.getElementById('materials-content');
    const tbody = document.getElementById('material-table-body');
    
    if (loader) loader.style.display = 'none';
    if (content) content.style.display = 'block';
    
    currentMaterials = data || [];
    if (!tbody) return;
    tbody.innerHTML = '';

    if (currentMaterials.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">No materials found.</td></tr>`;
      return;
    }
    
    currentMaterials.forEach((m) => {
      tbody.insertAdjacentHTML('beforeend', `
				<tr class="align-middle">
          <td class="p-0"> 
            <div class="d-flex align-items-center w-100 p-3">
              <div class="flex-grow-1">
                <div class="row g-3">
                  
                  <div class="col-12 col-md-6">
                    <div class="fw-bold text-primary">${m.item}</div>
                    <div class="small text-muted text-wrap">Note: ${m.note || '---'}</div>
                    <div class="small mt-1">
                      <span class="badge bg-light text-dark border">${m.roomName}</span>
											<span class="badge bg-light text-dark border">${m.taskName}</span>
                    </div>
                  </div>

                  <div class="col-12 col-md-6 border-start border-md-start">
                    <div class="">Qty: <span class="fw-bold">${m.value} ${m.unit}</span></div>
                    <div class="">Price: <span class="fw-bold">${m.price}</span> 
                      <span class="text-muted" style="font-size: 0.75rem;">(Sub: ${m.priceSubTotal})</span>
                    </div>
                    <div class="">Cost: <span class="fw-bold">${m.cost}</span>
                      <span class="text-muted" style="font-size: 0.75rem;">(Sub: ${m.costSubTotal})</span>
                    </div>
                  </div>

                </div>
              </div>

              <div class="ms-3 d-flex flex-column gap-2">
                <button class="btn btn-sm btn-outline-primary" onclick="handleEditMaterial(${m.sheetRow})">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="handleDeleteMaterial(${m.sheetRow})">
                  <i class="bi bi-trash"></i>
                </button>
              </div>

            </div>
          </td>
        </tr>
				
				`);
    });
  }

</script>
