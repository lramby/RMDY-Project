<div class="container-fluid p-3">
  
  <div id="site-loader" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="text-muted mt-2">Loading site information...</p>
  </div>

  <div id="site-no-selection" class="alert alert-warning shadow-sm" style="display:none;">
    <i class="bi bi-exclamation-triangle me-2"></i>
    No active project selected. Please go to <strong>Manage</strong> first.
  </div>

  <div id="site-content" style="display:none;">
    
    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="text-uppercase small fw-bold text-muted mb-1">Construction Type</div>
        <div id="display-construction" class="fs-6 fw-bold"></div>
      </div>
      <div class="col-md-4">
        <div class="text-uppercase small fw-bold text-muted mb-1">Approx. Sq Ft</div>
        <div id="display-sqft" class="fs-6 fw-bold"></div>
      </div>
      <div class="col-md-4">
        <div class="text-uppercase small fw-bold text-muted mb-1">Year Built</div>
        <div id="display-year" class="fs-6 fw-bold"></div>
      </div>
      <div class="col-md-4">
        <div class="text-uppercase small fw-bold text-muted mb-1">Occupancy</div>
        <div id="display-occupancy" class="fs-6 fw-bold"></div>
      </div>
      <div class="col-md-4">
        <div class="text-uppercase small fw-bold text-muted mb-1">Usage Type</div>
        <div id="display-usage" class="fs-6 fw-bold"></div>
      </div>
      <div class="col-md-4">
        <div class="text-uppercase small fw-bold text-muted mb-1">Residence Type</div>
        <div id="display-residence" class="fs-6 fw-bold"></div>
      </div>
      <div class="col-md-4">
        <div class="text-uppercase small fw-bold text-muted mb-1">Basement Selection</div>
        <div id="display-basement" class="fs-6 fw-bold"></div>
      </div>
    </div>

    <hr>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="fw-bold mb-0">Room Dimensions</h4>
      <button class="btn btn-primary btn-sm" onclick="openRoomModal()">
        <i class="bi bi-plus-lg"></i> Add Room
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle border">
        <tbody id="room-table-body"></tbody>
      </table>
    </div>

  </div>
</div>
