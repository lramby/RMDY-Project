<div class="container-fluid p-2">
  <div class="flex-grow-1 mx-md-4">
    <input type="text" id="projectSearch" class="form-control" onkeyup="filterProjects()" placeholder="Search...">
  </div>
  <div class="btn-group d-flex mx-md-4  mb-3">
    <button class="btn btn-outline-primary" onclick="openEditProjectModal()">
      <i class="bi bi-pencil me-2"></i> Edit Selected
    </button>
    <button class="btn btn-primary" onclick="openNewProjectModal()">
      <i class="bi bi-plus-lg me-2"></i> New Project
    </button>
  </div>
  <table class="table">
    <tbody id="table-body"></tbody>
  </table>
</div>
