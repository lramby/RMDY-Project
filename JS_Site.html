<script>

  function renderSite(data) {
    const loader = document.getElementById('site-loader'), 
          content = document.getElementById('site-content'), 
          noSel = document.getElementById('site-no-selection');
    
    if (loader) loader.style.display = 'none';
    
    if (!data) { 
      if (noSel) noSel.style.display = 'block'; 
      if (content) content.style.display = 'none';
      return; 
    }
    
    currentProjectData = data; 

    if (content) {
      content.style.display = 'block';
      if (noSel) noSel.style.display = 'none';

      // Helper matching your Details pattern
      const setLabel = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.innerText = val || '---';
      };

      setLabel('site-pid', data.pid);
      setLabel('display-sqft', data.sqFt);
      setLabel('display-construction', data.construction);
      setLabel('display-occupancy', data.occupancy);
      setLabel('display-year', data.yearBuilt);
      setLabel('display-usage', data.usage);
      setLabel('display-residence', data.residence);
      setLabel('display-basement', data.basement);
      
      loadRooms(); // Standard function call
    }
  }

  function loadRooms() {
    google.script.run.withSuccessHandler(renderRooms).getRoomData();
  }

  function renderRooms(rooms) {
    currentRooms = rooms || [];
    const tbody = document.getElementById('room-table-body');
    if (!tbody) return;
    tbody.innerHTML = '';

    if (currentRooms.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No rooms recorded.</td></tr>';
      return;
    }

    //card version
    currentRooms.forEach((room, index) => {
      const area = (parseFloat(room.l || 0) * parseFloat(room.w || 0)).toFixed(2);
      tbody.insertAdjacentHTML('beforeend', `
        <tr>
          <td>
            <table>
              <tr>
                <td><strong>${room.name} ${room.roomNum || ''}</strong></td>
              </tr>
              <tr>
                <td>${room.l}' x ${room.w}' x ${room.h}' = ${area}</td>
              </tr>
            </table>
          </td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary me-1" onclick="openRoomModal(${index})"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="handleDeleteRoom(${room.sheetRow})"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
      `);
    });

  }

</script>
