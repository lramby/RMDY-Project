<div class="modal fade" id="invoiceModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-body">
        <form id="invoiceForm">
          <input type="hidden" id="inv-row-index">
          <input type="hidden" id="inv-id-hidden"> <div class="mb-3">
            <label class="small fw-bold">Invoice #</label>
            <input type="text" id="inv-number" class="form-control">
          </div>
          <div class="mb-3">
            <label class="small fw-bold">Total</label>
            <input type="number" step="0.01" id="inv-total" class="form-control">
          </div>
          <div class="mb-3">
            <label class="small fw-bold">Date</label>
            <input type="date" id="inv-formattedDate" class="form-control">
          </div>
          <div class="mb-3">
            <label class="small fw-bold">Note</label>
            <input type="Text" id="inv-note" class="form-control">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitInvoice()">Save Invoice</button>
      </div>
    </div>
  </div>
</div>
