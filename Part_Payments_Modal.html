<div class="modal fade" id="paymentModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Payment Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="paymentForm">
          <input type="hidden" id="pay-sheet-row">
          <div class="mb-3">
            <label class="form-label fw-bold small">Invoice Number</label>
            <select id="pay-invoice" class="form-select">
              <option value="">Loading invoices...</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Amount</label>
            <input type="number" id="pay-amount" class="form-control" step="0.01">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Date</label>
            <input type="date" id="pay-date" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Payment Method</label>
            <select id="pay-method" class="form-select">
              <option value="Zelle">Zelle</option>
              <option value="Check">Check</option>
              <option value="Cash">Cash</option>
              <option value="Transfer">Bank Transfer</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Note</label>
            <textarea id="pay-note" class="form-control" rows="2"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="processSavePayment()">Save Payment</button>
      </div>
    </div>
  </div>
</div>
