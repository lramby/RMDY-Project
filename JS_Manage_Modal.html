<script>
/**
 * JS_Manage_Modal.html
 * Handles ONLY the Edit and New Project Modals
 */

/*============================================
* Create a Project
*============================================*/

function openNewProjectModal() {
  loadDropdownCache(() => {
    // 1. Populate the dropdowns using your existing populateSelect helper
    populateSelect('new-client', 'ContactName');
    populateSelect('new-type', 'ServiceType');

    // 2. Reset the form
    const form = document.getElementById('newProjectForm');
    if (form) {
      form.reset();
    } else {
      console.error("Could not find element with ID: newProjectForm");
    }

    // 3. Show the Modal
    const modalEl = document.getElementById('newProjectModal');
    if (modalEl) {
      bootstrap.Modal.getOrCreateInstance(modalEl).show();
    }
  });
}

function submitNewProject() {
  const btn = document.getElementById('createProjectBtn');
  const client = document.getElementById('new-client').value;
  if (!client) { alert("Please select a client."); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Creating...';

  const formData = {
    client: client,
    type: document.getElementById('new-type').value
  };
	
	google.script.run
    .withSuccessHandler(function(updatedData) {
      bootstrap.Modal.getInstance(document.getElementById('newProjectModal')).hide();
      btn.disabled = false;
      btn.innerText = 'Create Project';
      renderTable(updatedData);
    })
		.createNewProject(formData);
}



/*============================================
* Edit a Project
*============================================*/

function openEditModal() {
  const selected = manageDataList.find(item => item.isChecked);
  
  if (!selected) {
    alert("Please select a project from the list first.");
    return;
  }

  // Must use DASHES to match the submit function and HTML
  const rowEl = document.getElementById('edit-row-index');
  const statusEl = document.getElementById('edit-status');

  if (rowEl) rowEl.value = selected.rowIndex;
  if (statusEl) statusEl.value = selected.status;

  const modalEl = document.getElementById('manageEditModal');
  if (modalEl) {
    bootstrap.Modal.getOrCreateInstance(modalEl).show();
  }
}

/**
 * submitManageUpdate
 */
function submitManageUpdate() {
  // Now these match the IDs used in openEditModal above
  const rowEl = document.getElementById('edit-row-index');
  const statusEl = document.getElementById('edit-status');
  const modalEl = document.getElementById('manageEditModal');

  if (!rowEl || !statusEl) {
    console.error("Required elements (edit-row-index or edit-status) not found.");
    return;
  }

  const payload = {
    rowIndex: rowEl.value,
    status: statusEl.value
  };

  google.script.run
    .withSuccessHandler(function(updatedData) {
      const inst = bootstrap.Modal.getInstance(modalEl);
      if (inst) inst.hide();
      renderTable(updatedData);
    })
    .updateManageRow(payload);
}

</script>
