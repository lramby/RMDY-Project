<script>

  /**
   * Populates the main UI cards
   */
  function renderDates(data) {
    const loader = document.getElementById('dates-loader'), 
          content = document.getElementById('dates-content'), 
          noSel = document.getElementById('dates-no-selection');
          
    if (loader) loader.style.display = 'none';
    
    if (!data) { 
      if (noSel) noSel.style.display = 'block'; 
      if (content) content.style.display = 'none';
      return; 
    }
    
    // Assigning to the global variable shared across pages
    currentProjectData = data; 
    
    if (noSel) noSel.style.display = 'none';
    
    if (content) {
      content.style.display = 'block';
      
      // Helper to strip time or handle empty values
      const clean = (v) => (v && v !== "0:00:00") ? v.split(' ')[0] : '---';

      const pidEl = document.getElementById('dates-pid');
      if (pidEl) pidEl.innerText = data.pid || 'N/A';

      document.getElementById('date-loss').innerText = clean(data.loss);
      document.getElementById('date-due').innerText = clean(data.due);
      document.getElementById('date-contacted').innerText = clean(data.contacted);
      document.getElementById('date-assigned').innerText = clean(data.assigned);
      document.getElementById('date-inspected').innerText = clean(data.inspected);
      document.getElementById('date-estimated').innerText = clean(data.estimated);
      document.getElementById('date-started').innerText = clean(data.started);
      document.getElementById('date-finished').innerText = clean(data.finished);
      document.getElementById('date-invoiced').innerText = clean(data.invoiced);
      document.getElementById('date-approved').innerText = clean(data.approved);
      document.getElementById('date-paid').innerText = clean(data.paid);
    }
  }

</script>
