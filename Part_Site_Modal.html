<div class="modal fade" id="siteEditModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5 class="modal-title">Edit Site Information</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="siteEditForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Construction Type</label>
              <select id="edit-frame" class="form-select"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Approx. Sq Ft</label>
              <select id="edit-sqft" class="form-select"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Year Built</label>
              <input type="number" id="edit-yearBuilt" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Occupancy</label>
              <select id="edit-occupancy" class="form-select"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Usage Type</label>
              <select id="edit-usage" class="form-select"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Residence Type</label>
              <select id="edit-property-type" class="form-select"></select>
            </div>
            <div class="col-md-12">
              <label class="form-label small fw-bold">Basement Selection</label>
              <select id="edit-basement" class="form-select"></select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="siteSaveBtn" onclick="submitSiteEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="roomModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5 class="modal-title" id="roomModalTitle">Add Room</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="room-row-index">
        <div class="row g-3">
          <div class="col-8">
             <label class="form-label small fw-bold">Room Type</label>
             <input type="text" id="edit-room-name" class="form-control" placeholder="Bedroom">
          </div>
          <div class="col-4">
             <label class="form-label small fw-bold">Room #</label>
             <input type="text" id="edit-room-number" class="form-control" placeholder="101">
          </div>
          <div class="col-4">
             <label class="form-label small fw-bold">Length</label>
             <input type="number" id="edit-room-l" class="form-control" step="0.01">
          </div>
          <div class="col-4">
             <label class="form-label small fw-bold">Width</label>
             <input type="number" id="edit-room-w" class="form-control" step="0.01">
          </div>
          <div class="col-4">
             <label class="form-label small fw-bold">Height</label>
             <input type="number" id="edit-room-h" class="form-control" step="0.01">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveRoom()">Save Room</button>
      </div>
    </div>
  </div>
</div>
